# OpenEnv manifest — DC cooling environment (V2)
name: dc-openenv
version: "3.0.0"
description: >
  DC-OpenEnv — two complementary environments on a shared physics engine.
  (1) DC Cooling Control: three tasks from thermal recovery to cascading failure triage
      for evaluating LLM agents zero-shot on industrial control.
  (2) ClusterEnv: an RLVR training environment where an LLM cluster scheduler learns
      to allocate compute jobs across competing research teams under hard power and
      cooling constraints. Teams misrepresent priority and deadlines; the scheduler
      must learn to detect gaming, defer jobs to low-carbon windows, and prevent
      power budget violations.
author: "Team DC-OpenEnv"
license: Apache-2.0
tags:
  - openenv
  - data-center
  - cooling
  - cluster-scheduling
  - multi-agent
  - energy-efficiency
  - carbon-aware
  - safety-constrained
  - information-asymmetry
  - rlvr

runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy-single-zone
    difficulty: easy
    max_steps: 20
    description: >
      Single zone starts at 28.5 °C (overheating). Agent must recover to [18-27 °C]
      and maintain efficient cooling across 4 simulated hours (14:00-18:00).
      20 steps × 12 min/step = 4 hr; step_scale=2.4 condenses the original 48-step arc.
  - id: medium-multi-zone
    difficulty: medium
    max_steps: 30
    description: >
      Three zones with diurnal load surge (steps 6-17 in condensed timeline). One zone
      has a faulty sensor reporting up to +12 °C above true temperature; sensor_confidence
      degrades to ~0.1 by step ~10. Agent must infer true state, avoid over-cooling, and
      handle the morning peak load safely across 12 simulated hours (06:00-18:00).
      30 steps × 24 min/step = 12 hr; step_scale=4.8 condenses the original 144-step arc.
  - id: hard-cascading-failure
    difficulty: hard
    max_steps: 40
    description: >
      Four zones: chiller COP degrades at step 3 (sim-time ~02:24), chiller goes fully
      offline at step 8 (sim-time ~06:24). Agent must triage — protect CRITICAL priority
      zones (zone_ai_1, zone_ai_2) even at the expense of LOW priority zones, while
      minimising carbon cost during the high-carbon window (steps ~11-22).
      40 steps × 36 min/step = 24 hr; step_scale=7.2 condenses the original 288-step arc.

  # ── ClusterEnv: RLVR training environment ───────────────────────────────────
  - id: cluster-scheduler
    difficulty: hard
    max_steps: 8
    description: >
      An LLM-driven cluster scheduler allocates compute jobs across two competing
      research teams under a hard 900 kW facility power budget and thermal constraints.
      Team B systematically misrepresents job priority (claims CRITICAL when true=LOW)
      and deadline urgency (claims "urgent" when true deadline is 3–4 windows away).
      The scheduler must learn — through GRPO reinforcement learning — to detect gaming
      patterns, defer carbon-flexible jobs to low-carbon windows (6–7), and admit
      workloads without violating the power budget during peak demand windows (2–4).

      Episode: 8 negotiation windows × 18 physical steps (90 sim-min each) = 12 sim-hours.
      Carbon: LOW (windows 0–1) → HIGH (windows 2–4) → MEDIUM (window 5) → LOW (windows 6–7).
      Chiller fault at window 5 (optional, enabled by default) → supply temperature rises.

      Reward (3 components):
        R_throughput (+0.50): jobs completed before true deadline / total submitted.
        R_thermal    (−0.35): penalty when total admitted kW exceeds 900 kW budget.
        R_carbon     (+0.15): bonus for carbon-flexible jobs deferred to low-carbon windows.

      Baselines:
        accept_all            → 100% power violation rate (comparison baseline)
        priority_weighted_threshold → 0% violations, 0% carbon deferral (reward zero-line)
        trained GRPO agent    → <15% violations, >40% carbon deferral (demo target)

action_space:
  type: structured
  description: >
    Per-step DCAction: zone_adjustments (list) plus facility chiller controls.
  fields:
    - name: zone_adjustments
      type: list
      description: >
        One entry per zone; each item has zone_id (str), fan_speed_pct [0,100],
        supply_air_temp_setpoint_c [16,26].
    - name: chiller_setpoint_c
      type: float
      range: [6, 15]
      description: "Facility chilled-water setpoint (°C)"
    - name: chiller_active
      type: bool
      description: "Chiller on/off"
    - name: reasoning
      type: string
      optional: true
      description: "Optional explanation (graded on hard task)"

observation_space:
  type: structured
  description: >
    DCObservation: time, weather, chiller state, PUE, carbon labels, per-zone
    ZoneObservation fields, 3-step history buffer, SLA streak, maintenance hints.

reward_range: [-1.0, 1.0]
