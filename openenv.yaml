# OpenEnv manifest — DC cooling environment (V2)
name: dc-openenv
version: "2.0.0"
description: >
  Data Centre Cooling Control — a physics-based sequential decision environment
  for evaluating AI agents on real-world industrial control tasks.
  Three tasks from thermal recovery (easy) to carbon-aware cascading failure triage (hard).
author: "Team DC-OpenEnv"
license: Apache-2.0
tags:
  - openenv
  - data-center
  - cooling
  - energy-efficiency
  - carbon-aware
  - safety-constrained

runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy-single-zone
    difficulty: easy
    max_steps: 48
    description: >
      Single zone starts at 28.5 °C (overheating). Agent must recover to [18-27 °C]
      and maintain efficient cooling for 4 simulated hours at peak load.
  - id: medium-multi-zone
    difficulty: medium
    max_steps: 48
    description: >
      Three zones with diurnal load surge. One zone has a faulty sensor reporting
      +9-12 °C above true temperature. Agent must infer true state from sensor_confidence
      and cold_aisle_temp_c, avoid over-cooling, and handle peak load safely.
  - id: hard-cascading-failure
    difficulty: hard
    max_steps: 72
    description: >
      Four zones: chiller COP degrades at step 15, chiller goes offline at step 20.
      Agent must triage — protect CRITICAL priority zones (zone_ai_1, zone_ai_2)
      even at the expense of LOW priority zones, while minimising carbon cost.

action_space:
  type: structured
  description: >
    Per-step DCAction: zone_adjustments (list) plus facility chiller controls.
  fields:
    - name: zone_adjustments
      type: list
      description: >
        One entry per zone; each item has zone_id (str), fan_speed_pct [0,100],
        supply_air_temp_setpoint_c [16,26].
    - name: chiller_setpoint_c
      type: float
      range: [6, 15]
      description: "Facility chilled-water setpoint (°C)"
    - name: chiller_active
      type: bool
      description: "Chiller on/off"
    - name: reasoning
      type: string
      optional: true
      description: "Optional explanation (graded on hard task)"

observation_space:
  type: structured
  description: >
    DCObservation: time, weather, chiller state, PUE, carbon labels, per-zone
    ZoneObservation fields, 3-step history buffer, SLA streak, maintenance hints.

reward_range: [-1.0, 1.0]
