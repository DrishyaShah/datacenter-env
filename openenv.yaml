# openenv.yaml — single YAML combining metadata + runtime
name: dc-openenv
version: "2.0.0"
description: >
  Data Centre Cooling Control — a physics-based sequential decision environment
  for evaluating AI agents on real-world industrial control tasks.
  Three tasks from thermal recovery (easy) to carbon-aware cascading failure triage (hard).
author: "Team DC-OpenEnv"
license: Apache-2.0
tags:
  - openenv
  - data-center
  - cooling
  - energy-efficiency
  - carbon-aware
  - safety-constrained
tasks:
  - id: easy-single-zone
    difficulty: easy
    max_steps: 48
    description: "Single-zone thermal runaway recovery"
  - id: medium-multi-zone
    difficulty: medium
    max_steps: 144
    description: "Multi-zone load surge with sensor fault"
  - id: hard-cascading-failure
    difficulty: hard
    max_steps: 288
    description: "Cascading chiller failure with carbon-aware triage"
action_space:
  type: structured
  fields:
    - name: fan_speed_pct
      type: float
      range: [0, 100]
    - name: supply_air_temp_setpoint_c
      type: float
      range: [16, 26]
    - name: chiller_setpoint_c
      type: float
      range: [6, 15]
    - name: chiller_active
      type: bool
observation_space:
  type: structured
  description: "Per-zone sensor readings + facility state + 3-step history buffer"
reward_range: [-1.0, 1.0]
